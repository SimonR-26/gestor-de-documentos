<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Documentos - Durley</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="landing-body">

  <div class="landing-wrapper">
    <div class="landing-card">
      <div class="landing-logo">📁</div>
      <h1 class="landing-title">Portal de Documentos</h1>
      <p class="landing-subtitle">Selecciona tu modo de acceso</p>

      <div class="landing-options">
        <a href="user.html" class="option-card">
          <div class="option-icon">👁️</div>
          <h2>Ver Documentos</h2>
          <p>Accede y descarga los documentos disponibles sin necesidad de cuenta.</p>
          <span class="option-badge badge-public">Acceso Público</span>
        </a>

        <a href="admin.html" class="option-card">
          <div class="option-icon">🔐</div>
          <h2>Panel de Administrador</h2>
          <p>Gestiona documentos, sube archivos y administra el sistema.</p>
          <span class="option-badge badge-admin">Requiere Login</span>
        </a>
      </div>
    </div>
  </div>

</body>
</html>
